<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎭 MBTI 성격 테스트</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    background:linear-gradient(135deg,#667eea,#764ba2);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.container{
    background:white;
    width:100%;
    max-width:800px;
    border-radius:20px;
    padding:30px;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

h1{
    text-align:center;
    margin-bottom:20px;
}

.progress{
    width:100%;
    height:15px;
    background:#eee;
    border-radius:10px;
    overflow:hidden;
    margin-bottom:20px;
}

.progress-bar{
    height:100%;
    width:0%;
    background:#667eea;
    transition:.3s;
}

.question-number{
    color:#666;
    margin-bottom:10px;
}

.question{
    font-size:1.4rem;
    font-weight:bold;
    margin-bottom:25px;
}

.btn-group{
    display:flex;
    gap:15px;
}

button{
    flex:1;
    padding:15px;
    border:none;
    border-radius:10px;
    font-size:18px;
    cursor:pointer;
    transition:.2s;
}

.yes{
    background:#667eea;
    color:white;
}

.no{
    background:#ddd;
}

button:hover{
    transform:translateY(-3px);
}

.result{
    text-align:center;
    display:none;
}

.mbti{
    font-size:50px;
    margin:15px 0;
    color:#764ba2;
}

.character{
    font-size:90px;
}

.card{
    background:#f5f5f5;
    border-radius:15px;
    padding:15px;
    margin-top:15px;
    text-align:left;
}

.restart{
    margin-top:20px;
    background:#764ba2;
    color:white;
}
</style>
</head>
<body>

<div class="container">

<div id="quiz">

<h1>🎭 MBTI 성격 테스트</h1>

<div class="progress">
<div class="progress-bar" id="progressBar"></div>
</div>

<div class="question-number" id="number"></div>
<div class="question" id="question"></div>

<div class="btn-group">
<button class="yes" onclick="answer(true)">예</button>
<button class="no" onclick="answer(false)">아니오</button>
</div>

</div>

<div class="result" id="result"></div>

</div>

<script>

const questions = [

["사람들과 어울리는 것이 즐겁다.","E"],
["새로운 사람을 만나는 것을 좋아한다.","E"],
["혼자보다 함께하는 활동을 선호한다.","E"],
["생각보다 행동이 먼저인 편이다.","E"],

["현실적인 사실을 중요하게 생각한다.","S"],
["구체적인 설명이 좋다.","S"],
["실용적인 해결책을 선호한다.","S"],
["현재에 집중하는 편이다.","S"],

["결정할 때 논리를 우선한다.","T"],
["감정보다 사실이 중요하다.","T"],
["비판을 잘 받아들인다.","T"],
["객관적인 판단을 선호한다.","T"],

["계획을 세우는 것을 좋아한다.","J"],
["마감 전에 일을 끝낸다.","J"],
["정리정돈이 잘 되어있다.","J"],
["일정이 갑자기 바뀌면 불편하다.","J"],

["혼자 있는 시간이 필요하다.","I"],
["많은 사람과 있으면 피곤하다.","I"],
["말하기 전에 생각한다.","I"],
["소수의 친구가 편하다.","I"],

["상상하는 것을 좋아한다.","N"],
["아이디어를 떠올리는 것이 즐겁다.","N"],
["미래 가능성에 관심이 많다.","N"],
["창의적인 일을 좋아한다.","N"],

["다른 사람 감정을 잘 고려한다.","F"],
["공감 능력이 좋은 편이다.","F"],
["관계를 중요하게 생각한다.","F"],
["배려하는 편이다.","F"],

["즉흥 여행을 좋아한다.","P"],
["계획 없이 움직이는 편이다.","P"],
["선택지를 열어두는 편이다.","P"],
["마감 직전에 집중이 잘 된다.","P"]

];

let current = 0;

let score = {
E:0,I:0,
S:0,N:0,
T:0,F:0,
J:0,P:0
};

const resultData = {

INTJ:{
emoji:"🧠👑",
name:"전략가",
desc:"미래를 설계하는 천재 전략가",
good:"분석력, 독립성, 계획성",
bad:"고집, 감정표현 부족"
},

INTP:{
emoji:"🤓⚙️",
name:"논리술사",
desc:"호기심 넘치는 아이디어 뱅크",
good:"창의력, 논리력",
bad:"우유부단, 실행력 부족"
},

ENTJ:{
emoji:"🦁🚀",
name:"통솔자",
desc:"타고난 리더",
good:"결단력, 추진력",
bad:"지배적일 수 있음"
},

ENTP:{
emoji:"😎💡",
name:"변론가",
desc:"토론과 아이디어의 달인",
good:"창의성, 적응력",
bad:"산만함"
},

INFJ:{
emoji:"🦉💜",
name:"옹호자",
desc:"이상주의적 조언자",
good:"통찰력, 공감",
bad:"예민함"
},

INFP:{
emoji:"🌈🦄",
name:"중재자",
desc:"감성 가득한 꿈꾸는 사람",
good:"창의성, 배려",
bad:"현실감 부족"
},

ENFJ:{
emoji:"🤗🌟",
name:"주인공",
desc:"사람을 이끄는 따뜻한 리더",
good:"배려심, 리더십",
bad:"타인 눈치"
},

ENFP:{
emoji:"🎉🦊",
name:"활동가",
desc:"열정 넘치는 자유인",
good:"에너지, 창의성",
bad:"충동적"
},

ISTJ:{
emoji:"📚🛡️",
name:"현실주의자",
desc:"책임감 강한 관리자",
good:"성실함, 신뢰성",
bad:"융통성 부족"
},

ISFJ:{
emoji:"🐻💖",
name:"수호자",
desc:"따뜻한 보호자",
good:"배려, 책임감",
bad:"거절 어려움"
},

ESTJ:{
emoji:"💼👮",
name:"경영자",
desc:"체계적인 조직가",
good:"실행력, 조직력",
bad:"보수적"
},

ESFJ:{
emoji:"🥰🎀",
name:"집정관",
desc:"친절한 인기인",
good:"친화력, 배려",
bad:"평가에 민감"
},

ISTP:{
emoji:"🔧😏",
name:"장인",
desc:"문제 해결 전문가",
good:"실용성, 분석력",
bad:"무심함"
},

ISFP:{
emoji:"🎨🐱",
name:"모험가",
desc:"감성 아티스트",
good:"예술성, 자유로움",
bad:"계획 부족"
},

ESTP:{
emoji:"🏎️🔥",
name:"사업가",
desc:"스릴을 즐기는 행동파",
good:"대담함, 적응력",
bad:"성급함"
},

ESFP:{
emoji:"🎤✨",
name:"연예인",
desc:"분위기 메이커",
good:"사교성, 긍정성",
bad:"충동성"
}

};

function showQuestion(){

document.getElementById("number").innerText=
`${current+1} / ${questions.length}`;

document.getElementById("question").innerText=
questions[current][0];

document.getElementById("progressBar").style.width=
((current/questions.length)*100)+"%";

}

function answer(value){

if(value){
score[questions[current][1]]++;
}

current++;

if(current>=questions.length){
showResult();
return;
}

showQuestion();

}

function showResult(){

document.getElementById("quiz").style.display="none";

let mbti="";

mbti += score.E >= score.I ? "E":"I";
mbti += score.S >= score.N ? "S":"N";
mbti += score.T >= score.F ? "T":"F";
mbti += score.J >= score.P ? "J":"P";

let data=resultData[mbti];

document.getElementById("result").style.display="block";

document.getElementById("result").innerHTML=`

<h1>🎉 결과 발표</h1>

<div class="character">${data.emoji}</div>

<div class="mbti">${mbti}</div>

<h2>${data.name}</h2>

<p>${data.desc}</p>

<div class="card">
<h3>👍 장점</h3>
<p>${data.good}</p>
</div>

<div class="card">
<h3>⚠️ 단점</h3>
<p>${data.bad}</p>
</div>

<button class="restart" onclick="location.reload()">
다시 테스트하기
</button>

`;

}

showQuestion();

</script>

</body>
</html>
